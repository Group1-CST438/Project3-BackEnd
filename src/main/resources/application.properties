spring.application.name=Project3-BackEnd

# Default profile uses H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:project3db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=8080

# ---- To switch to PostgreSQL, comment out the H2 section above and uncomment below ----
# spring.datasource.url=jdbc:postgresql://localhost:5432/project3db
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=your_username
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
